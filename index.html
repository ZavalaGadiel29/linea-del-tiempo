.prog-wrap{background:var(--color-background-primary,#fff);padding:10px 0 10px;border-bottom:0.5px solid var(--color-border-tertiary,#e0e0e0)}
.prog-bar{height:3px;background:var(--color-border-tertiary,#e0e0e0);border-radius:99px;margin:0 1.2rem;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:#7F77DD;transition:width .6s cubic-bezier(.34,1.56,.64,1)}

.card-top{display:flex;align-items:stretch}

.card-info{flex:1;padding:1rem 1rem 1rem .5rem}
.card-num{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;opacity:0;transform:translateX(-10px);transition:all .4s ease .2s}

.card-title{font-size:17px;font-weight:500;color:var(--color-text-primary,#111);margin-bottom:6px;line-height:1.25;opacity:0;transform:translateX(-10px);transition:all .4s ease .3s}
.card-title.in{opacity:1;transform:translateX(0)}
.card-body{font-size:13px;color:var(--color-text-secondary,#555);line-height:1.65;margin-bottom:8px;opacity:0;transform:translateX(-10px);transition:all .4s ease .4s}
.card-body.in{opacity:1;transform:translateX(0)}
.card-quote{font-size:12px;font-style:italic;color:var(--color-text-tertiary,#888);border-left:2px solid var(--color-border-secondary,#ccc);padding-left:8px;margin-bottom:10px;border-radius:0;opacity:0;transform:translateX(-10px);transition:all .4s ease .5s}
.card-quote.in{opacity:1;transform:translateX(0)}

.particles-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}

function spawnParticles(color,x,y){
  resizeCanvas();
  const rect=gCanvas.getBoundingClientRect();
  for(let i=0;i<28;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*5;
    const size=3+Math.random()*6;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-2,
      alpha:1,size,
      color,
      decay:0.02+Math.random()*0.02,
      gravity:0.12
    });
  }
  if(!animId) animateParticles();
}

function animateParticles(){
  gCtx.clearRect(0,0,gCanvas.width,gCanvas.height);
  particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=p.gravity;
    p.vx*=0.97;
    p.alpha-=p.decay;
    gCtx.save();
    gCtx.globalAlpha=Math.max(0,p.alpha);
    gCtx.fillStyle=p.color;
    gCtx.beginPath();
    gCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    gCtx.fill();
    gCtx.restore();
  });
  if(particles.length>0){
    animId=requestAnimationFrame(animateParticles);
  } else {
    animId=null;
    gCtx.clearRect(0,0,gCanvas.width,gCanvas.height);
  }
}

function triggerEffect(el,color){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  spawnParticles(color,cx,cy);
}

function updateProg(){
  const p=Math.round(visited.size/TOPICS.length*100);
  document.getElementById('prog').style.width=p+'%';
  document.getElementById('prog-lbl').textContent=visited.size+' de '+TOPICS.length+' temas explorados';
}

function buildAll(){
  const el=document.getElementById('all-view');
  let h='';
  TOPICS.forEach((t,i)=>{
    const seen=visited.has(i);
    const delay=i*80;
    h+=`<div class="mini mini-enter" style="animation-delay:${delay}ms" onclick="go(${i})" id="mini-${i}">
      <div style="width:4px;align-self:stretch;background:${t.accent};border-radius:2px;flex-shrink:0"></div>
      <div class="mini-illus">${t.svg}</div>
      <div class="mini-text">
        <div class="mini-title">${t.num}. ${t.title}</div>
        <div class="mini-sub">${t.sub}</div>
      </div>
      ${seen?`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${t.accent}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary,#aaa)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'}
    </div>`;
  });
  h+=`<div style="background:var(--color-background-secondary,#f5f4f0);border-radius:12px;padding:.8rem 1rem;margin-top:.5rem;text-align:center;animation:miniIn .4s .5s both">
    <p style="font-size:12px;color:var(--color-text-secondary,#666);font-style:italic;line-height:1.6">"Las humanidades nos enseñan a pensar, a comprender y a ser mejores humanos"</p>
  </div>`;
  el.innerHTML=h;
}

function buildCard(i){
  const t=TOPICS[i];
  return `<div class="card" id="main-card">
    <div class="accent-top" id="accent-bar" style="background:${t.accent}"></div>
    <div class="card-top">
      <div class="illus-wrap" style="background:${t.bg};" id="illus-wrap">
        ${t.svg}
        <div class="ripple-ring" id="ripple" style="width:80px;height:80px;left:30px;top:30px;border-color:${t.accent}"></div>
      </div>
      <div class="card-info">
        <div class="card-num" id="cn" style="color:${t.txt}">Tema ${t.num}</div>
        <div class="card-title" id="ct">${t.title}</div>
        <div class="card-body" id="cb">${t.body}</div>
        <div class="card-quote" id="cq">${t.quote}</div>
        <div class="tags" id="ctags">${t.tags.map((tg,ti)=>`<span class="tag" id="tag-${ti}" style="transition-delay:${.55+ti*.07}s">${tg}</span>`).join('')}</div>
        <button class="ask-btn" id="ask-b" onclick="sendPrompt('${t.ask}')"><i class="ti ti-message-circle" aria-hidden="true"></i> Explorar más ↗</button>
      </div>
    </div>
  </div>`;
}

function go(i){
  cur=i; visited.add(i); updateProg(); buildAll();
  document.getElementById('all-view').style.display='none';
  const tv=document.getElementById('topic-view');
  tv.style.display='block';
  tv.innerHTML=buildCard(i)+`<div class="nav-row" id="nav-row">
    <button class="ask-btn" onclick="nav(-1)" ${i===0?'disabled style="opacity:.35"':''}>
      <i class="ti ti-arrow-left" aria-hidden="true"></i> Anterior</button>
    <button class="ask-btn" onclick="nav(1)" ${i===TOPICS.length-1?'disabled style="opacity:.35"':''}>
      Siguiente <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    <button class="ask-btn" onclick="showAll()" style="margin-left:auto">
      <i class="ti ti-layout-grid" aria-hidden="true"></i> Ver todos</button>
  </div>`;

  const illus=document.getElementById('illus-wrap');
  triggerEffect(illus, TOPICS[i].accent);

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const card=document.getElementById('main-card');
      if(card) card.classList.add('in');
      const ab=document.getElementById('accent-bar');
      if(ab) ab.classList.add('in');
      const svg=tv.querySelector('.illus-svg');
      if(svg){setTimeout(()=>svg.classList.add('in'),80);}
      ['cn','ct','cb','cq'].forEach(id=>{
        const el=document.getElementById(id);
        if(el) el.classList.add('in');
      });
      TOPICS[i].tags.forEach((_,ti)=>{
        const el=document.getElementById('tag-'+ti);
        if(el) setTimeout(()=>{el.style.opacity='1';el.style.transform='none';},550+ti*70);
      });
      const ab2=document.getElementById('ask-b');
      if(ab2) ab2.classList.add('in');
      const nr=document.getElementById('nav-row');
      if(nr) nr.classList.add('in');
      const rr=document.getElementById('ripple');
      if(rr){
        setTimeout(()=>{rr.style.animation='ripple 1s ease-out forwards';},200);
        setTimeout(()=>{rr.style.animation='ripple 1s ease-out forwards';rr.style.animationDelay='0.3s';},500);
      }
      const illusSvg=tv.querySelector('.illus-svg');
      if(illusSvg) setTimeout(()=>illusSvg.classList.add('illus-pulse'),700);
    });
  });

  const tabs=document.querySelectorAll('.tab-btn');
  tabs.forEach((b,idx)=>b.classList.toggle('active',idx===i+1));
}

function nav(d){const n=cur+d;if(n>=0&&n<TOPICS.length)go(n);}

function showAll(){
  document.getElementById('all-view').style.display='block';
  document.getElementById('topic-view').style.display='none';
  buildAll();
  const tabs=document.querySelectorAll('.tab-btn');
  tabs.forEach((b,idx)=>b.classList.toggle('active',idx===0));
}

buildAll();
</script>
