];
const visited=new Set();let cur=0;
const canvas=document.getElementById('pc');const ctx=canvas.getContext('2d');
let particles=[];let animId=null;
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
const sc=document.getElementById('stars-canvas');const sctx=sc.getContext('2d');let stars=[];
function initStars(){
  sc.width=sc.parentElement.offsetWidth||400;sc.height=sc.parentElement.offsetHeight||140;
  stars=Array.from({length:60},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,r:.5+Math.random()*1.5,phase:Math.random()*Math.PI*2,speed:.02+Math.random()*.03}));
  animStars();
}
function animStars(){
  sctx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{s.phase+=s.speed;const a=.2+.8*Math.abs(Math.sin(s.phase));sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle='rgba(255,255,255,'+a+')';sctx.fill();});
  requestAnimationFrame(animStars);
}
window.addEventListener('load',initStars);setTimeout(initStars,100);
function spawnParticles(color,x,y){
  resizeCanvas();
  for(let i=0;i<40;i++){const angle=Math.random()*Math.PI*2;const speed=2+Math.random()*7;particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2.5,alpha:1,size:2+Math.random()*8,color,decay:.014+Math.random()*.02,gravity:.1});}
  if(!animId)animP();
}
function animP(){
  ctx.clearRect(0,0,canvas.width,canvas.height);particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.97;p.alpha-=p.decay;ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore();});
  animId=particles.length>0?requestAnimationFrame(animP):null;if(!animId)ctx.clearRect(0,0,canvas.width,canvas.height);
}
function updateProg(){const p=Math.round(visited.size/TOPICS.length*100);document.getElementById('prog').style.width=p+'%';document.getElementById('prog-lbl').textContent=visited.size+' de '+TOPICS.length+' temas explorados';}
function buildAll(){
  const el=document.getElementById('all-view');let h='';
  TOPICS.forEach((t,i)=>{const seen=visited.has(i);
    h+=`<div class="mini mini-enter" style="animation-delay:${i*80}ms;border-left:4px solid ${t.accent}" onclick="go(${i})">
      <div class="mini-wm" style="color:${t.wmColor}">${t.wm}</div>
      <div class="mini-illus">${t.minisvg}</div>
      <div style="flex:1;position:relative;z-index:2"><div class="mini-title" style="color:${t.accent}">${t.num}. ${t.title}</div><div class="mini-sub">${t.sub}</div></div>
      ${seen?`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${t.accent}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`}
    </div>`;
  });
  h+=`<div class="footer-q"><p>"Las humanidades nos enseñan a pensar, a comprender y a ser mejores humanos"</p></div>`;
  el.innerHTML=h;
}
function buildCard(i){const t=TOPICS[i];
  return `<div class="card" id="main-card" style="background:${t.bodyBg}">
    <div class="card-bg"><div class="watermark" style="color:${t.wmColor};bottom:-10px;right:-10px">${t.wm}</div><div class="watermark" style="color:${t.wmColor};top:10px;left:-10px;font-size:60px;opacity:.04">${t.wm}</div></div>
    <div class="accent-top" id="accent-bar" style="background:linear-gradient(90deg,${t.accent},${t.accentLight},${t.accent})"></div>
    <div class="card-top">
      <div class="illus-wrap" style="background:linear-gradient(160deg,${t.accentLight},${t.accentLight}99);" id="illus-wrap">${t.svg}</div>
      <div class="card-info">
        <div class="card-num" id="cn" style="color:${t.txtLight};letter-spacing:.12em">✦ Tema ${t.num} ✦</div>
        <div class="card-title" id="ct" style="background:linear-gradient(90deg,${t.accentDark},${t.accent});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${t.title}</div>
        <div class="title-underline" id="tul" style="background:linear-gradient(90deg,${t.accent},${t.txtLight})"></div>
        <div class="card-body" id="cb" style="color:${t.bodyColor}">${t.body}</div>
        <div class="card-quote" id="cq" style="color:${t.quoteColor};background:${t.quoteBg};border-color:${t.accent}">${t.quote}</div>
        <div class="tags">${t.tags.map((tg,ti)=>`<span class="tag" id="tag-${ti}" style="background:${t.tagBg};color:${t.tagColor};border-color:${t.accent}55;transition-delay:${.55+ti*.07}s;font-weight:700">${tg}</span>`).join('')}</div>
      </div>
    </div>
  </div>`;
}
function go(i){
  cur=i;visited.add(i);updateProg();buildAll();
  document.getElementById('all-view').style.display='none';
  const tv=document.getElementById('topic-view');tv.style.display='block';
  const t=TOPICS[i];
  tv.innerHTML=buildCard(i)+`<div class="nav-row" id="nav-row">
    <button class="nav-btn" onclick="nav(-1)" ${i===0?'disabled':''} style="border-color:${t.accent}55;color:${t.txt}">← Anterior</button>
    <button class="nav-btn" onclick="nav(1)" ${i===TOPICS.length-1?'disabled':''} style="border-color:${t.accent}55;color:${t.txt}">Siguiente →</button>
    <button class="nav-btn" onclick="showAll()" style="margin-left:auto;border-color:${t.accent}55;color:${t.txt}">⊞ Ver todos</button>
  </div>`;
  const iw=document.getElementById('illus-wrap');const rect=iw.getBoundingClientRect();
  spawnParticles(t.accent,rect.left+rect.width/2,rect.top+rect.height/2);
  spawnParticles(t.accentLight,rect.left+rect.width/2,rect.top+rect.height/2);
  const tabs=document.querySelectorAll('.tab-btn');
  tabs.forEach((b,idx)=>{b.classList.toggle('active',idx===i+1);if(idx===i+1){b.style.background=TOPICS[i].accent;b.style.color='#fff';b.style.borderColor=TOPICS[i].accent;}else{b.style.background='transparent';b.style.color='#666';b.style.borderColor='rgba(0,0,0,.15)';}});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const card=document.getElementById('main-card');if(card)card.classList.add('in');
    const ab=document.getElementById('accent-bar');if(ab)ab.classList.add('in');
    ['cn','ct','cb','cq'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('in');});
    const tul=document.getElementById('tul');if(tul)tul.classList.add('in');
    TOPICS[i].tags.forEach((_,ti)=>{const el=document.getElementById('tag-'+ti);if(el)setTimeout(()=>{el.style.opacity='1';el.style.transform='none';},550+ti*70);});
    const nr=document.getElementById('nav-row');if(nr)nr.classList.add('in');
  }));
}
function nav(d){const n=cur+d;if(n>=0&&n<TOPICS.length)go(n);}
function showAll(){
  document.getElementById('all-view').style.display='block';document.getElementById('topic-view').style.display='none';buildAll();
  const tabs=document.querySelectorAll('.tab-btn');
  tabs.forEach((b,idx)=>{b.classList.toggle('active',idx===0);if(idx===0){b.style.background='#534AB7';b.style.color='#fff';b.style.borderColor='#534AB7';}else{b.style.background='transparent';b.style.color='#666';b.style.borderColor='rgba(0,0,0,.15)';}});
}
buildAll();
</script>
</body>
