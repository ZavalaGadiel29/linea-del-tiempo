<title>La Máquina del Ser Humano — Humanidades</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0603;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:0}
#machine{width:100%;max-width:680px;position:relative;overflow:hidden;font-family:system-ui,sans-serif;border-right:2px solid #5C3D0A;border-left:2px solid #5C3D0A}
.mh{background:linear-gradient(90deg,#4A2E05,#B8880C 25%,#F0C030 50%,#B8880C 75%,#4A2E05);padding:.75rem 1rem;text-align:center;border-bottom:3px solid #3A2004;position:relative;z-index:3}
.mh h1{font-size:20px;font-weight:900;color:#1C0F05;text-transform:uppercase;letter-spacing:.07em;line-height:1.2}
.mh p{font-size:9px;font-weight:800;color:#2C1A08;letter-spacing:.22em;text-transform:uppercase;margin-top:2px}
.gs{padding:.8rem .4rem .4rem;transition:opacity .35s,transform .35s;position:relative;z-index:2}
.gg{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;max-width:660px;margin:0 auto}
.gi{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:.3rem;border-radius:10px;transition:background .2s;user-select:none;-webkit-tap-highlight-color:transparent}
.gi:hover{background:rgba(255,255,255,.07)}
.gi:hover .gsw{transform:scale(1.07) rotate(3deg)}
.gi:active .gsw{transform:scale(.93)}
.gsw{transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.gl{margin-top:4px;text-align:center}
.gn{font-size:8px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase}
.gname{font-size:10px;font-weight:700;line-height:1.25;text-align:center}
.ip{display:none;min-height:500px;position:relative;z-index:2}
.back-bar{display:flex;align-items:center;gap:8px;padding:.6rem 1rem;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.12);cursor:pointer;transition:background .2s;position:relative;z-index:3}
.back-bar:hover{background:rgba(0,0,0,.65)}
.back-arrow{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;flex-shrink:0;transition:transform .2s;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.back-bar:hover .back-arrow{transform:translateX(-4px)}
.back-txt{font-size:13px;font-weight:700;color:rgba(255,255,255,.88);letter-spacing:.03em}
.back-sub{font-size:10px;color:rgba(255,255,255,.38);margin-left:auto}
.ipi{opacity:0;transform:translateY(30px) scale(.96);transition:opacity .45s,transform .55s cubic-bezier(.34,1.56,.64,1)}
.ipi.open{opacity:1;transform:none}
.ih{padding:1.2rem 1rem .7rem;display:flex;align-items:center;gap:.9rem;border-bottom:1px solid rgba(255,255,255,.1)}
.iic{width:86px;height:86px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:3px solid;overflow:hidden}
.itw{flex:1}
.inum{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:2px;opacity:.65}
.ititle{font-size:22px;font-weight:900;line-height:1.15}
.tul{height:3px;border-radius:99px;margin-top:4px;transform:scaleX(0);transform-origin:left;transition:transform .5s ease .55s}
.tul.in{transform:scaleX(1)}
.isub{font-size:11px;opacity:.5;margin-top:3px}
.ic{padding:.8rem 1rem .5rem}
.ibody{font-size:13.5px;line-height:1.74;margin-bottom:.75rem}
.iquote{font-size:12.5px;font-style:italic;padding:9px 13px;border-radius:8px;border-left:3px solid;margin-bottom:.75rem}
.itags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.5rem}
.itag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px}
.inav{display:flex;gap:8px;padding:.4rem 1rem 1rem}
.nbtn{flex:1;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:rgba(255,255,255,.88);font-size:12px;font-weight:600;cursor:pointer;transition:background .2s}
.nbtn:hover{background:rgba(255,255,255,.16)}
.nbtn:disabled{opacity:.25;cursor:default}
.pdots{display:flex;gap:6px;justify-content:center;padding:.4rem 0 0}
.pdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:all .25s}
.pdot.active{width:20px;border-radius:4px}
.mfoot{background:rgba(0,0,0,.3);border-top:1px solid rgba(255,255,255,.07);padding:.5rem 1rem;text-align:center}
.mfoot p{font-size:11px;font-style:italic;background:linear-gradient(90deg,#FAC775,#AFA9EC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600}
@keyframes spinCW{to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes floatX{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.1);opacity:1}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes scaleBreath{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
@keyframes wave{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(9deg)}}
@keyframes spinSlowR{to{transform:rotate(-360deg)}}
@keyframes spinSlowF{to{transform:rotate(360deg)}}
@keyframes titleIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes tagPop{from{opacity:0;transform:scale(.6) translateY(8px)}to{opacity:1;transform:none}}
@keyframes steamRise{0%{transform:translateY(0) scale(1);opacity:.45}100%{transform:translateY(-55px) scale(2.8);opacity:0}}
@keyframes needleOsc{0%,100%{transform:rotate(-35deg)}50%{transform:rotate(30deg)}}
@keyframes needleOsc2{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(50deg)}}
@keyframes ambientPulse{0%,100%{opacity:.04}50%{opacity:.1}}
@keyframes leverShake{0%,100%{transform:rotate(0)}20%{transform:rotate(-15deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-6deg)}80%{transform:rotate(3deg)}}
@keyframes pipeGlow{0%,100%{opacity:.6}50%{opacity:.9}}
@keyframes gearBoom{0%{transform:scale(1)}25%{transform:scale(.88) rotate(-5deg)}60%{transform:scale(1.12) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
@media(max-width:500px){.mh h1{font-size:15px}.ititle{font-size:18px}.ih{gap:.6rem}.iic{width:72px;height:72px}}

<script>
function gearPath(n,R,r){
  const s=Math.PI*2/n,q=s*.27;let d='';
  for(let i=0;i<n;i++){
    const a=i*s-Math.PI/2;
    [[Math.cos(a-q)*r,Math.sin(a-q)*r],[Math.cos(a-q)*R,Math.sin(a-q)*R],[Math.cos(a+q)*R,Math.sin(a+q)*R],[Math.cos(a+q)*r,Math.sin(a+q)*r]].forEach((p,j)=>{
      d+=(i===0&&j===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)+' ';
    });
  }
  return d+'Z';
}

let cur=0;const visited=new Set();
const pc=document.getElementById('pc');
const pctx=pc.getContext('2d');
let parts=[];let animId=null;

function resizePC(){pc.width=document.getElementById('machine').offsetWidth||660;pc.height=document.getElementById('machine').offsetHeight||600;}

function spawnParts(color,x,y,n){
  resizePC();
  const mr=document.getElementById('machine').getBoundingClientRect();
  const px=x-mr.left,py=y-mr.top;
  for(let i=0;i<(n||45);i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*8;
    parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,alpha:1,size:1.5+Math.random()*8,color,decay:.013+Math.random()*.022,gravity:.1});
  }
  if(!animId)animParts();
}
function animParts(){
  pctx.clearRect(0,0,pc.width,pc.height);
  parts=parts.filter(p=>p.alpha>0);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.97;p.alpha-=p.decay;pctx.save();pctx.globalAlpha=Math.max(0,p.alpha);pctx.fillStyle=p.color;pctx.beginPath();pctx.arc(p.x,p.y,p.size,0,Math.PI*2);pctx.fill();pctx.restore();});
  animId=parts.length>0?requestAnimationFrame(animParts):null;
  if(!animId)pctx.clearRect(0,0,pc.width,pc.height);
}

function flash(color){
  const f=document.getElementById('flash');
  f.style.background=color;f.style.opacity='.5';
  setTimeout(()=>{f.style.transition='opacity .5s';f.style.opacity='0';setTimeout(()=>{f.style.transition='';},500);},130);
}

function shakeLever(){
  const lv=document.getElementById('lever');
  if(lv){lv.style.animation='leverShake .6s ease both';setTimeout(()=>{lv.style.animation='';},700);}
}

function buildGears(){
  const gg=document.getElementById('gg');gg.innerHTML='';
  T.forEach((t,i)=>{
    const div=document.createElement('div');div.className='gi';
    div.onclick=(e)=>openGear(i,e);
    const gp=gearPath(t.teeth,56,44);
    const spin=t.dir==='CW'?'spinCW':'spinCCW';
    div.innerHTML=`<div class="gsw" id="gsw${i}"><svg width="126" height="126" viewBox="-63 -63 126 126">
      <defs><clipPath id="cp${i}"><circle r="40"/></clipPath><radialGradient id="rg${i}" cx="38%" cy="35%"><stop offset="0%" stop-color="${t.aL}"/><stop offset="100%" stop-color="${t.aL}bb"/></radialGradient></defs>
      <g style="animation:${spin} ${t.dur} linear infinite"><path d="${gp}" fill="${t.accent}" stroke="${t.aD}" stroke-width="1.2"/><circle r="41" fill="${t.aD}"/></g>
      <circle r="38" fill="url(#rg${i})"/>
      <g clip-path="url(#cp${i})">${t.ill}</g>
      ${visited.has(i)?`<circle r="11" cx="24" cy="-24" fill="#1D9E75" stroke="#fff" stroke-width="1.2"/><path d="M19 -24 L22 -21 L29 -28" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`:''}
      <circle r="7" fill="${t.aD}" stroke="${t.accent}" stroke-width="1.3"/><circle r="3" fill="${t.accent}"/>
    </svg></div>
    <div class="gl"><div class="gn">Tema ${t.num}</div><div class="gname" style="color:${t.accent}">${t.title}</div></div>`;
    gg.appendChild(div);
  });
}

function openGear(i,e){
  cur=i;visited.add(i);
  const t=T[i];
  const sw=document.getElementById('gsw'+i);
  if(sw){
    const r=sw.getBoundingClientRect();
    spawnParts(t.accent,r.left+r.width/2,r.top+r.height/2,50);
    spawnParts(t.aL,r.left+r.width/2,r.top+r.height/2,25);
    sw.style.animation='gearBoom .5s ease both';
    setTimeout(()=>{sw.style.animation='';},500);
  }
  flash(t.accent);shakeLever();
  buildGears();
  const gs=document.getElementById('gs'),ip=document.getElementById('ip'),ipi=document.getElementById('ipi');
  gs.style.opacity='0';gs.style.transform='scale(.94) translateY(-8px)';
  const ba=document.getElementById('back-bar');
  if(ba){const arr=document.getElementById('back-arrow');if(arr){arr.style.background=t.accent+'44';arr.style.color=t.accent;}}
  setTimeout(()=>{
    gs.style.display='none';ip.style.display='block';
    renderInfo(i);
    requestAnimationFrame(()=>requestAnimationFrame(()=>ipi.classList.add('open')));
  },320);
}

function closeGear(){
  const gs=document.getElementById('gs'),ip=document.getElementById('ip'),ipi=document.getElementById('ipi');
  ipi.classList.remove('open');
  setTimeout(()=>{
    ip.style.display='none';gs.style.display='block';
    gs.style.opacity='0';gs.style.transform='scale(.94)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{gs.style.opacity='1';gs.style.transform='scale(1)';}));
  },360);
}

function renderInfo(i){
  const t=T[i];
  document.getElementById('ih').innerHTML=`
    <div class="iic" style="background:${t.aD};border-color:${t.accent}">
      <svg width="74" height="74" viewBox="-37 -37 74 74"><defs><clipPath id="cpd"><circle r="33"/></clipPath></defs>
      <circle r="33" fill="${t.aL}" opacity=".92"/><g clip-path="url(#cpd)">${t.ill}</g>
      <circle r="5" fill="${t.aD}" stroke="${t.accent}" stroke-width="1"/><circle r="2" fill="${t.accent}"/></svg>
    </div>
    <div class="itw">
      <div class="inum" style="color:${t.txt}">⚙ Tema ${t.num} ⚙</div>
      <div class="ititle" style="background:linear-gradient(90deg,${t.aL},${t.accent},${t.aL});background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:titleIn .4s ease both">${t.title}</div>
      <div class="tul" id="tul" style="background:linear-gradient(90deg,${t.accent},${t.txt})"></div>
      <div class="isub" style="color:rgba(255,255,255,.5)">${t.sub}</div>
    </div>`;
  setTimeout(()=>{const tul=document.getElementById('tul');if(tul)tul.classList.add('in');},50);
  document.getElementById('pdots').innerHTML=T.map((_,idx)=>`<div class="pdot${idx===i?' active':''}" style="${idx===i?'background:'+T[i].accent:''}" onclick="goTo(${idx})"></div>`).join('');
  document.getElementById('ic').innerHTML=`
    <div class="ibody" style="color:rgba(255,255,255,.88);animation:fadeUp .4s .1s ease both">${t.body}</div>
    <div class="iquote" style="color:${t.txt};background:${t.qBg};border-color:${t.accent};animation:fadeUp .4s .2s ease both">${t.quote}</div>
    <div class="itags" style="animation:fadeUp .4s .3s ease both">${t.tags.map((tg,ti)=>`<span class="itag" style="background:${t.tBg};color:${t.tC};animation:tagPop .35s ${.4+ti*.08}s ease both">${tg}</span>`).join('')}</div>`;
  document.getElementById('inav').innerHTML=`
    <button class="nbtn" onclick="goTo(${i-1})" ${i===0?'disabled':''} style="border-color:${t.accent}55">← Anterior</button>
    <button class="nbtn" onclick="goTo(${i+1})" ${i===T.length-1?'disabled':''} style="border-color:${t.accent}55">Siguiente →</button>`;
}

function goTo(i){
  if(i<0||i>=T.length)return;
  const t=T[i];cur=i;visited.add(i);buildGears();
  flash(t.accent);shakeLever();
  const ipi=document.getElementById('ipi');
  ipi.classList.remove('open');
  setTimeout(()=>{renderInfo(i);requestAnimationFrame(()=>requestAnimationFrame(()=>ipi.classList.add('open')));},180);
}

window.addEventListener('resize',resizePC);
buildGears();
</script>
